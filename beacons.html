<!DOCTYPE html>
<html>
<body>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://eskafzlbaaqkqqbmgpft.supabase.co",
  "sb_publishable_pd8j_QxhCQS1SQNM1cn6Aw_NyMLdu8s"
);

const btn = document.createElement("div");
btn.textContent = "💬";
btn.style.cssText = `
position:fixed;
bottom:20px;
right:20px;
width:56px;
height:56px;
border-radius:50%;
background:#111;
color:white;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
z-index:999999;
font-size:22px;
`;

const panel = document.createElement("div");
panel.style.cssText = `
position:fixed;
inset:10px;
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,0.4);
transform:scale(0);
transform-origin:bottom right;
transition:0.2s ease;
z-index:999998;
`;

document.body.appendChild(btn);
document.body.appendChild(panel);

btn.onclick = () => {
  panel.style.transform =
    panel.style.transform === "scale(1)" ? "scale(0)" : "scale(1)";
};

async function load() {
  try {
    const { data, error } = await supabase
      .from("scripts")
      .select("url")
      .limit(1)
      .maybeSingle();

    if (error) {
      panel.innerHTML = `<pre>Supabase error:\n${JSON.stringify(error, null, 2)}</pre>`;
      return;
    }

    if (!data || !data.url) {
      panel.innerHTML = `<pre>No URL found in Supabase.\n\nReturned:\n${JSON.stringify(data, null, 2)}</pre>`;
      return;
    }

    const url = data.url.trim();

    panel.innerHTML = `
      <iframe
        src="${url}"
        style="width:100%;height:100%;border:none;"
      ></iframe>
    `;

  } catch (e) {
    panel.innerHTML = `<pre>Crash:\n${e.message}</pre>`;
  }
}

load();
</script>

</body>
</html>
